<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBoxsites - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; }
        .card { background-color: #333; width: 340px; padding: 35px 25px; border-radius: 35px; text-align: center; border: 1px solid #444; }
        .blue { color: #569cd6; }
        .input-box { width: 100%; background-color: #444; border: none; border-radius: 12px; padding: 14px; color: white; text-align: center; margin-bottom: 15px; outline: none; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: bold; background: linear-gradient(to bottom, #eee, #aaa); cursor: pointer; color: black; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        #waitingText { color: #569cd6; font-weight: bold; font-size: 11px; margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <div style="text-align:center; margin-bottom: 40px;">
        <h2>Hi, Selamat Datang</h2>
        <h1 style="font-style:italic;">GBox<span class="blue" style="font-style:normal;">sites</span></h1>
    </div>
    <div class="card">
        <h3 style="font-family:cursive; font-size:30px; margin-bottom:10px;">Selamat Datang!</h3>
        <p style="font-size:11px; color:#ccc; margin-bottom:20px;">Sila Masukkan username kamu di kotak<br>yang disediakan<br><span class="blue">Contoh : @username001</span></p>
        <input type="text" id="usernameInput" class="input-box" placeholder="@username001">
        <div class="btn-group">
            <button class="btn" onclick="handleLogin()">Login</button>
            <a href="#" class="btn">Beli</a>
        </div>
        <div id="waitingText">**Menunggu Kebenaran Admin**</div>
    </div>

    <script>
        setInterval(checkStatus, 2000);

        function generateID() {
            const now = new Date();
            const dd = String(now.getDate()).padStart(2, '0');
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const yyyy = String(now.getFullYear());
            const datePrefix = dd + mm + yyyy; // Contoh: 26032026

            let db = JSON.parse(localStorage.getItem('gbox_db')) || [];
            
            // Cari pendaftaran yang bermula dengan tarikh hari ini
            const todayRegistrations = db.filter(u => u.id && u.id.startsWith(datePrefix));
            
            // Tentukan nombor giliran (GGG)
            let nextSequence = todayRegistrations.length + 1;
            const ggg = String(nextSequence).padStart(3, '0');

            return datePrefix + ggg; // Hasil: 26032026001
        }

        function handleLogin() {
            const val = document.getElementById('usernameInput').value.trim().toLowerCase();
            if (!val.startsWith('@') || val.includes('admin')) return alert("Username tidak sah!");
            
            localStorage.setItem('currentUser', val);
            let db = JSON.parse(localStorage.getItem('gbox_db')) || [];
            
            if (!db.find(u => u.name === val)) {
                const newID = generateID();
                db.push({ 
                    name: val, 
                    status: 'pending', 
                    id: newID 
                });
                localStorage.setItem('gbox_db', JSON.stringify(db));
            }
            checkStatus();
        }

        function checkStatus() {
            const user = localStorage.getItem('currentUser');
            if (!user) return;
            if (user === "@admin" || user === "@haikal") { window.location.href = "adminmode.html"; return; }
            let db = JSON.parse(localStorage.getItem('gbox_db')) || [];
            let found = db.find(u => u.name === user);
            if (found && found.status === 'active') { 
                window.location.href = "homepage.html"; 
            } else if (found) { 
                document.getElementById('waitingText').style.display = 'block'; 
            }
        }
    </script>
</body>
</html>
